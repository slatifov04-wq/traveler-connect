<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Traveler Connect - Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #4f46e5; --bg: #f8fafc; --card: #ffffff; --text: #1e293b; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); padding: 20px; transition: 0.3s; }
        .container { max-width: 800px; margin: auto; }
        .card { background: var(--card); padding: 24px; border-radius: 20px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); margin-bottom: 20px; transition: transform 0.2s; }
        input, textarea, select { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #e2e8f0; border-radius: 12px; box-sizing: border-box; outline: none; }
        input:focus { border-color: var(--primary); }
        button { width: 100%; padding: 14px; background: var(--primary); color: white; border: none; border-radius: 12px; font-weight: 600; cursor: pointer; transition: 0.3s; }
        button:hover { opacity: 0.9; transform: scale(1.01); }
        .profile-img { width: 100px; height: 100px; border-radius: 50%; object-fit: cover; border: 4px solid var(--primary); margin-bottom: 15px; }
        .dark { --bg: #0f172a; --card: #1e293b; --text: #f1f5f9; }
    </style>
</head>
<body>

<div class="container">
    <button onclick="toggleDarkMode()" style="width: auto; margin-bottom: 20px;">🌙 Rejim</button>

    <div class="card">
        <h2 style="margin-top:0;">✈️ Səyahətçi Profili Yarat</h2>
        <input id="name" placeholder="Adınız">
        <input id="country" placeholder="Ölkə">
        <input id="city" placeholder="Şəhər">
        <input id="budget" type="number" placeholder="Büdcə ($)">
        <button onclick="saveTraveler()">Profili Paylaş</button>
    </div>

    <div id="travelersList"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyA5ZXlknI-jq50zGyEsCv56xruEsirjanE",
  projectId: "traveler-connect-616a1",
  storageBucket: "traveler-connect-616a1.firebasestorage.app",
  messagingSenderId: "601977790428",
  appId: "1:601977790428:web:b69dab80eb7bceab233919"
};

const db = getFirestore(initializeApp(firebaseConfig));

window.saveTraveler = async function(){
    const data = {
        name: document.getElementById("name").value,
        country: document.getElementById("country").value,
        city: document.getElementById("city").value,
        budget: document.getElementById("budget").value,
        createdAt: new Date().toISOString()
    };
    await addDoc(collection(db, "travelers"), data);
    alert("Profil uğurla yaradıldı!");
    loadTravelers();
};

window.loadTravelers = async function(){
    const snapshot = await getDocs(collection(db, "travelers"));
    let html = "";
    snapshot.forEach(doc => {
        const d = doc.data();
        html += `
        <div class="card" style="text-align:center;">
            <img src="https://ui-avatars.com/api/?name=${encodeURIComponent(d.name)}" class="profile-img">
            <h3 style="margin:5px 0;">${d.name}</h3>
            <p style="color:var(--primary); font-weight:600;">${d.country}, ${d.city}</p>
            <p style="font-size: 0.9em; opacity: 0.8;">Büdcə: ${d.budget}$</p>
        </div>`;
    });
    document.getElementById("travelersList").innerHTML = html;
};

window.toggleDarkMode = () => {
    document.body.classList.toggle("dark");
};

loadTravelers();
</script>
</body>
</html>
