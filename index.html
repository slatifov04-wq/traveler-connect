<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Traveler Connect</title>
    <style>
        body { font-family:Arial,sans-serif; background:#f5f5f5; padding:20px; margin:0; transition: 0.3s; }
        .container { max-width:900px; margin:auto; }
        .card { background:white; padding:20px; border-radius:15px; margin-bottom:20px; box-shadow:0 2px 10px rgba(0,0,0,.1); transition: 0.3s; }
        input,textarea,select { width:100%; padding:12px; margin:8px 0; border:1px solid #ddd; border-radius:8px; box-sizing:border-box; }
        button { width:100%; padding:12px; background:#007bff; color:white; border:none; border-radius:8px; font-size:16px; cursor:pointer; margin-top: 5px; }
        h1, h2 { text-align:center; }
        label { font-weight: bold; margin-top:10px; display:block; }
    </style>
</head>
<body>

<button onclick="toggleDarkMode()">🌙 Dark Mode</button>

<div class="card">
    <h2>📊 Statistika</h2>
    <p id="totalTravelers">Ümumi istifadəçi: 0</p>
</div>

<div class="container">
    <div class="card">
        <h1>Traveler Connect ✈️</h1>
        <input id="name" placeholder="Ad Soyad">
        <input id="age" type="number" placeholder="Yaş">
        <select id="gender">
            <option value="">Cinsiyyət</option>
            <option>Kişi</option>
            <option>Qadın</option>
        </select>
        <select id="country">
            <option value="">Ölkə seç</option>
            <option>Azərbaycan</option><option>Türkiyə</option><option>Gürcüstan</option><option>Rusiya</option><option>Qazaxıstan</option><option>Özbəkistan</option><option>Almaniya</option><option>Fransa</option><option>İtaliya</option><option>İspaniya</option><option>İngiltərə</option><option>ABŞ</option><option>Kanada</option><option>BƏƏ</option><option>Yaponiya</option><option>Çin</option><option>Cənubi Koreya</option><option>Misir</option><option>Tailand</option><option>Hindistan</option>
        </select>
        <input id="city" placeholder="Şəhər">
        <input id="budget" type="number" placeholder="Büdcə ($)">
        <label>✈️ Gediş tarixi</label>
        <input id="travelDate" type="date">
        <label>🔄 Dönüş tarixi</label>
        <input id="returnDate" type="date">
        <input id="whatsapp" placeholder="WhatsApp nömrəsi">
        <input id="telegram" placeholder="Telegram username">
        <input id="photo" placeholder="Profil şəkli linki">
        <textarea id="interests" placeholder="Turizm, Dağçılıq, Dəniz..."></textarea>
        <button onclick="saveTraveler()">Profili Paylaş</button>
    </div>

    <div class="card">
        <h2>🔍 Səyahətçiləri Tap</h2>
        <input id="search" placeholder="Ölkə və ya şəhər axtar..." onkeyup="loadTravelers()">
        <select id="budgetFilter" onchange="loadTravelers()"><option value="">Bütün büdcələr</option><option value="500">500$+</option><option value="1000">1000$+</option><option value="2000">2000$+</option><option value="5000">5000$+</option></select>
        <select id="genderFilter" onchange="loadTravelers()"><option value="">Bütün cinslər</option><option value="Kişi">Kişi</option><option value="Qadın">Qadın</option></select>
        <select id="ageFilter" onchange="loadTravelers()"><option value="">Bütün yaşlar</option><option value="18">18+</option><option value="25">25+</option><option value="30">30+</option><option value="40">40+</option></select>
        <select id="interestFilter" onchange="loadTravelers()"><option value="">Bütün maraqlar</option><option value="Turizm">Turizm</option><option value="Dağçılıq">Dağçılıq</option><option value="Dəniz">Dəniz</option><option value="Backpacking">Backpacking</option><option value="Lüks">Lüks</option></select>
        <select id="sortBy" onchange="loadTravelers()"><option value="newest">Ən yeni</option><option value="oldest">Ən köhnə</option><option value="budgetHigh">Büdcə yüksək</option><option value="budgetLow">Büdcə aşağı</option><option value="ageHigh">Yaş böyük</option><option value="ageLow">Yaş kiçik</option></select>
    </div>

    <div id="travelersList">Yüklənir...</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyA5ZXlknI-jq50zGyEsCv56xruEsirjanE",
  authDomain: "traveler-connect-616a1.firebaseapp.com",
  projectId: "traveler-connect-616a1",
  storageBucket: "traveler-connect-616a1.firebasestorage.app",
  messagingSenderId: "601977790428",
  appId: "1:601977790428:web:b69dab80eb7bceab233919"
};

const db = getFirestore(initializeApp(firebaseConfig));

window.saveTraveler = async function(){
    const data = {
        name: document.getElementById("name").value.trim(),
        age: document.getElementById("age").value.trim(),
        gender: document.getElementById("gender").value,
        country: document.getElementById("country").value.trim(),
        city: document.getElementById("city").value.trim(),
        budget: document.getElementById("budget").value.trim(),
        travelDate: document.getElementById("travelDate").value,
        returnDate: document.getElementById("returnDate").value,
        whatsapp: document.getElementById("whatsapp").value.trim(),
        telegram: document.getElementById("telegram").value.trim(),
        photo: document.getElementById("photo").value.trim(),
        interests: document.getElementById("interests").value.trim(),
        lastSeen: new Date().toISOString(),
        isOnline: true,
        createdAt: new Date().toISOString()
    };
    await addDoc(collection(db,"travelers"), data);
    alert("Profil əlavə edildi!");
    
    document.getElementById("name").value="";
    document.getElementById("age").value="";
    document.getElementById("gender").value="";
    document.getElementById("country").value="";
    document.getElementById("city").value="";
    document.getElementById("budget").value="";
    document.getElementById("travelDate").value="";
    document.getElementById("returnDate").value="";
    document.getElementById("whatsapp").value="";
    document.getElementById("telegram").value="";
    document.getElementById("photo").value="";
    document.getElementById("interests").value="";
    loadTravelers();
};

window.loadTravelers = async function(){
    const list = document.getElementById("travelersList");
    const snapshot = await getDocs(collection(db,"travelers"));
    let travelers = [];
    snapshot.forEach(doc => travelers.push(doc.data()));

    const search = document.getElementById("search").value.toLowerCase();
    const genderFilter = document.getElementById("genderFilter").value;
    const ageFilter = document.getElementById("ageFilter").value;
    const sortBy = document.getElementById("sortBy").value;
    const bFilter = parseInt(document.getElementById("budgetFilter").value) || 0;
    const iFilter = document.getElementById("interestFilter").value;

    if(sortBy === "newest") travelers.sort((a,b) => new Date(b.createdAt) - new Date(a.createdAt));
    if(sortBy === "oldest") travelers.sort((a,b) => new Date(a.createdAt) - new Date(b.createdAt));
    if(sortBy === "budgetHigh") travelers.sort((a,b) => parseInt(b.budget || 0) - parseInt(a.budget || 0));
    if(sortBy === "budgetLow") travelers.sort((a,b) => parseInt(a.budget || 0) - parseInt(b.budget || 0));
    if(sortBy === "ageHigh") travelers.sort((a,b) => parseInt(b.age || 0) - parseInt(a.age || 0));
    if(sortBy === "ageLow") travelers.sort((a,b) => parseInt(a.age || 0) - parseInt(b.age || 0));

    let html = "";
    travelers.forEach(d => {
        const matchesSearch = (d.country || "").toLowerCase().includes(search) || (d.city || "").toLowerCase().includes(search);
        const matchesBudget = bFilter === 0 || parseInt(d.budget || 0) >= bFilter;
        const matchesInterest = iFilter === "" || (d.interests || "").includes(iFilter);
        const matchesGender = genderFilter === "" || d.gender === genderFilter;
        const matchesAge = ageFilter === "" || parseInt(d.age || 0) >= parseInt(ageFilter);
        
        let matchScore = 75;
        
        if(matchesSearch && matchesBudget && matchesInterest && matchesGender && matchesAge){
            html += `
            <div class="card" style="text-align:center;">
                <img src="${d.photo || `https://ui-avatars.com/api/?name=${encodeURIComponent(d.name)}`}" style="width:120px; height:120px; border-radius:50%; object-fit:cover; margin:auto; border:3px solid #007bff;">
                <h3>${d.name}</h3>
                <p>🎂 Yaş: ${d.age || '-'}</p>
                <p>👤 ${d.gender || '-'}</p>
                <p>🌍 ${d.country}</p>
                <p>🏙️ ${d.city}</p>
                <p>💰 Büdcə: ${d.budget || '-'}</p>
                <p>✈️ Gediş: ${d.travelDate || '-'}</p>
                <p>🏠 Dönüş: ${d.returnDate || '-'}</p>
                <p>🎯 ${d.interests || '-'}</p>
                <p>🕒 Son aktivlik: ${d.lastSeen ? new Date(d.lastSeen).toLocaleDateString() : "-"}</p>
                <p>🤝 Uyğunluq: ${matchScore}%</p>
                <a href="https://wa.me/${(d.whatsapp || '').replace(/[^0-9]/g,'')}" target="_blank" style="padding:10px 15px; background:green; color:white; text-decoration:none; border-radius:8px; margin:5px;">WhatsApp</a>
                <a href="https://t.me/${d.telegram || ''}" target="_blank" style="padding:10px 15px; background:#0088cc; color:white; text-decoration:none; border-radius:8px; margin:5px;">Telegram</a>
                <br><br><button onclick="alert('Favoriyə əlavə edildi')">❤️ Favoriyə əlavə et</button>
            </div>`;
        }
    });
    list.innerHTML = html || "Heç bir nəticə tapılmadı.";
    document.getElementById("totalTravelers").innerText = "Ümumi istifadəçi: " + travelers.length;
};

window.toggleDarkMode = function(){
    document.body.classList.toggle("dark");
    localStorage.setItem("darkMode", document.body.classList.contains("dark"));
}
if(localStorage.getItem("darkMode") === "true") document.body.classList.add("dark");

const style = document.createElement("style");
style.innerHTML = `.dark { background:#111; color:white; } .dark .card { background:#1e1e1e; color:white; } .dark input, .dark textarea, .dark select { background:#333; color:white; border:1px solid #555; }`;
document.head.appendChild(style);

loadTravelers();
</script>
</body>
</html>
