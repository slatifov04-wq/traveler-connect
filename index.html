<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyA5ZXlknI-jq50zGyEsCv56xruEsirjanE",
authDomain: "traveler-connect-616a1.firebaseapp.com",
projectId: "traveler-connect-616a1",
storageBucket: "traveler-connect-616a1.firebasestorage.app",
messagingSenderId: "601977790428",
appId: "1:601977790428:web:b69dab80eb7bceab233919",
measurementId: "G-YNPPEPQQM0"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.saveTraveler = async function(){

const name = document.getElementById("name").value.trim();
const country = document.getElementById("country").value.trim();
const city = document.getElementById("city").value.trim();
const budget = document.getElementById("budget").value.trim();
const interests = document.getElementById("interests").value.trim();

if(!name || !country || !city){
alert("Ad, ölkə və şəhər yazın");
return;
}

try{

await addDoc(collection(db,"travelers"),{
name,
country,
city,
budget,
interests,
createdAt:new Date()
});

alert("Profil əlavə edildi");

document.getElementById("name").value="";
document.getElementById("country").value="";
document.getElementById("city").value="";
document.getElementById("budget").value="";
document.getElementById("interests").value="";

loadTravelers();

}catch(error){

console.error(error);
alert("Xəta baş verdi");

}
};

window.loadTravelers = async function(){

const list = document.getElementById("travelersList");

if(!list) return;

const searchElement = document.getElementById("search");
const budgetElement = document.getElementById("budgetFilter");

const searchTerm = searchElement ? searchElement.value.toLowerCase() : "";
const budgetFilter = budgetElement ? budgetElement.value : "";

list.innerHTML = "Yüklənir...";

const snapshot = await getDocs(collection(db,"travelers"));

let html = "";
snapshot.forEach((doc)=>{

const d = doc.data();

const matchesSearch =
(d.city || "").toLowerCase().includes(searchTerm) ||
(d.country || "").toLowerCase().includes(searchTerm);

const matchesBudget =
budgetFilter === "" ||
parseInt(d.budget || 0) >= parseInt(budgetFilter);

if(matchesSearch && matchesBudget){

html += `
<div style="
background:white;
padding:15px;
margin:10px 0;
border-radius:12px;
box-shadow:0 2px 8px rgba(0,0,0,.1);
">

<h3>${d.name}</h3>

<p>🌍 ${d.country}</p>

<p>🏙️ ${d.city}</p>

<p>💰 Büdcə: ${d.budget}</p>

<p>🎯 ${d.interests}</p>

</div>
`;

}

});

list.innerHTML = html || "Heç bir nəticə tapılmadı.";

};

loadTravelers();

</script>
