<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Traveler Connect</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial,sans-serif;
background:#f4f6f9;
padding:20px;
}

.container{
max-width:900px;
margin:auto;
}

.header{
background:#007bff;
color:white;
padding:20px;
border-radius:15px;
margin-bottom:20px;
text-align:center;
}

.card{
background:white;
padding:15px;
border-radius:15px;
margin-bottom:15px;
box-shadow:0 2px 10px rgba(0,0,0,.1);
}

input,textarea,select{
width:100%;
padding:12px;
margin-top:8px;
margin-bottom:8px;
border:1px solid #ddd;
border-radius:10px;
}

button{
width:100%;
padding:12px;
background:#007bff;
color:white;
border:none;
border-radius:10px;
font-size:16px;
cursor:pointer;
}

button:hover{
opacity:.9;
}

.user-card{
background:#eef4ff;
padding:12px;
border-radius:12px;
margin-top:10px;
}

.badge{
display:inline-block;
padding:5px 10px;
background:#007bff;
color:white;
border-radius:20px;
font-size:12px;
margin-top:5px;
}

.match{
color:green;
font-weight:bold;
margin-top:5px;
}
</style>
</head>

<body>

<div class="container">

<div class="header">
<h1>🌍 Traveler Connect</h1>
<p>Dost tap • Travel Buddy tap • Səyahət paylaş</p>
</div>

<div class="card">

<h2>Profil yarat</h2>

<input id="name" placeholder="Ad">

<input id="country" placeholder="Gedəcəyin ölkə">

<input id="city" placeholder="Şəhər">

<input id="budget" placeholder="Büdcə">

<textarea id="interests" placeholder="Maraqlar (təbiət, əyləncə, istirahət və s.)"></textarea>

<button onclick="saveTraveler()">
Profili paylaş
</button>

</div>

<div class="card">

<h2>Axtar</h2>

<input
id="search"
placeholder="Ölkə və ya şəhər axtar..."
onkeyup="filterTravelers()">

</div>

<div class="card">

<h2>Səyahətçilər</h2>

<div id="travelers"></div>

</div>

</div>

<script>

let travelers =
JSON.parse(
localStorage.getItem("travelers")
) || [];

function saveTraveler(){

const traveler = {

name:
document.getElementById("name").value,

country:
document.getElementById("country").value,

city:
document.getElementById("city").value,

budget:
document.getElementById("budget").value,

interests:
document.getElementById("interests").value

};

travelers.push(traveler);

localStorage.setItem(
"travelers",
JSON.stringify(travelers)
);

alert("Profil əlavə edildi");

renderTravelers();

}

function calculateMatch(user){

let score = 50;

const myCountry =
document.getElementById("country").value
.toLowerCase();

const myCity =
document.getElementById("city").value
.toLowerCase();

if(
user.country &&
user.country.toLowerCase() === myCountry
){
score += 25;
}

if(
user.city &&
user.city.toLowerCase() === myCity
){
score += 25;
}

return Math.min(score,100);
}
function renderTravelers(list = travelers){

let html = "";

list.forEach((user,index)=>{

html += `
<div class="user-card">

<h3>${user.name || "İstifadəçi"}</h3>

<p>🌍 ${user.country || "-"}</p>

<p>🏙 ${user.city || "-"}</p>

<p>💰 ${user.budget || "-"}</p>

<p>🎯 ${user.interests || "-"}</p>

<div class="badge">
Travel Buddy
</div>

<div class="match">
Uyğunluq:
${calculateMatch(user)}%
</div>

</div>
`;

});

document.getElementById("travelers").innerHTML =
html;

}

function filterTravelers(){

const search =
document.getElementById("search")
.value
.toLowerCase();

const filtered =
travelers.filter(user =>

(user.country || "")
.toLowerCase()
.includes(search)

||

(user.city || "")
.toLowerCase()
.includes(search)

||

(user.interests || "")
.toLowerCase()
.includes(search)

);

renderTravelers(filtered);

}

renderTravelers();

</script>

</body>
</html>
