<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Traveler Connect</title>

<style>
body{
font-family:Arial,sans-serif;
padding:20px;
background:#f5f5f5;
}

.container{
max-width:500px;
margin:auto;
background:white;
padding:20px;
border-radius:12px;
}

input,textarea{
width:100%;
padding:12px;
margin:8px 0;
border:1px solid #ddd;
border-radius:8px;
}

button{
width:100%;
padding:12px;
background:#007bff;
color:white;
border:none;
border-radius:8px;
font-size:16px;
}

h1{
text-align:center;
}
</style>
</head>

<body>

<div class="container">
<h1>Traveler Connect ✈️</h1>

<input id="name" placeholder="Adınız">

<input id="country" placeholder="Ölkə">

<input id="city" placeholder="Şəhər">

<input id="budget" placeholder="Büdcə">

<textarea id="interests" placeholder="Maraqlarınız"></textarea>

<button onclick="saveTraveler()">Paylaş</button>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyA5ZXlknI-jq50zGyEsCv56xruEsirjanE",
authDomain: "traveler-connect-616a1.firebaseapp.com",
projectId: "traveler-connect-616a1",
storageBucket: "traveler-connect-616a1.firebasestorage.app",
messagingSenderId: "601977790428",
appId: "1:601977790428:web:b69dab80eb7bceab233919",
measurementId: "G-YNPPEPQQM0"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.saveTraveler = async function() {

const name = document.getElementById("name").value;
const country = document.getElementById("country").value;
const city = document.getElementById("city").value;
const budget = document.getElementById("budget").value;
const interests = document.getElementById("interests").value;

await addDoc(collection(db,"travelers"),{
name,
country,
city,
budget,
interests,
createdAt:new Date()
});

alert("Profil əlavə edildi!");
}

</script>

</body>
</html>
