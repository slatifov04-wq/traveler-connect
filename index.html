<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Traveler Connect</title>

<style>
body{
font-family:Arial,sans-serif;
background:#f5f5f5;
margin:0;
padding:20px;
}

.card{
background:white;
padding:15px;
border-radius:12px;
margin-bottom:15px;
box-shadow:0 2px 8px rgba(0,0,0,.1);
}

input,select,button{
width:100%;
padding:12px;
margin-top:8px;
margin-bottom:8px;
box-sizing:border-box;
}

button{
background:#0d6efd;
color:white;
border:none;
border-radius:8px;
}

h1{
text-align:center;
}
</style>
</head>

<body>

<h1>🌍 Traveler Connect</h1>

<div class="card">
<h3>Səyahətini paylaş</h3>

<input id="name" placeholder="Adın">

<input id="country" placeholder="Gedəcəyin ölkə">

<input id="city" placeholder="Şəhər">

<input id="date" type="date">

<select id="budget">
<option>0-50$</option>
<option>50-100$</option>
<option>100-200$</option>
<option>200$+</option>
</select>

<input id="interest" placeholder="Maraqlar">

<button onclick="addTraveler()">Paylaş</button>
</div>

<div class="card">
<h3>Travelers</h3>
<div id="list"></div>
</div>

<script>

let travelers=[];

function addTraveler(){

const user={
name:name.value,
country:country.value,
city:city.value,
date:date.value,
budget:budget.value,
interest:interest.value
};

travelers.push(user);

render();

}

function render(){

list.innerHTML="";

travelers.forEach(t=>{

list.innerHTML+=`
<div class="card">
<b>${t.name}</b><br>
📍 ${t.country} - ${t.city}<br>
📅 ${t.date}<br>
💰 ${t.budget}<br>
🎯 ${t.interest}
</div>
`;

});

}

</script>

</body>
</html>
